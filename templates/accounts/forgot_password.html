{% extends "base.html" %}

{% block title %}Forgot Password | QuickShop{% endblock %}

{% block content %}
<style>
  .auth-wrap{
    min-height: 70vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }
  .auth-card{
    width: 100%;
    max-width: 420px;
    background: #fff;
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 18px 45px rgba(0,0,0,0.08);
    border: 1px solid rgba(0,0,0,0.06);
  }
  .auth-title{
    margin: 0 0 8px 0;
    font-size: 28px;
    font-weight: 900;
    color: #111827;
  }
  .auth-sub{
    margin: 0 0 20px 0;
    color: #6b7280;
    font-weight: 500;
    line-height: 1.6;
  }
  .auth-links a{
    text-decoration: none;
    font-weight: 800;
    color: #7c3aed;
  }
</style>

<div class="auth-wrap">
  <div class="auth-card">
    <h1 class="auth-title">Forgot Password</h1>
    <p class="auth-sub">
      Password reset is not connected yet in this starter build.
      We can add email-based reset next.
    </p>

    <div class="auth-links">
      <a href="{% url 'login' %}">Back to login</a>
    </div>
  </div>
</div>
{% endblock %}
